name: Create App on VM

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest

    steps:
      - name: Provision app + secrets on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GITHUB_REPOSITORY,VITE_API_BASE_URL,VITE_PERSIST_SEARCH_CACHE,SITE_PASSCODE
          script: |
            set -e

            APP_NAME="$(basename $GITHUB_REPOSITORY)"
            APP_DIR="/opt/apps/$APP_NAME"

            echo "➡ Setting up $APP_NAME"

            sudo mkdir -p /opt/apps
            sudo chown -R ubuntu:ubuntu /opt/apps

            echo "➡ Cloning repository"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "https://github.com/${GITHUB_REPOSITORY}" "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Write .env from manifest env_vars
            MANIFEST="$APP_DIR/codebuild/app.manifest.json"
            WORKDIR=$(jq -r '.working_dir' "$MANIFEST")
            APP_WORKDIR="$APP_DIR/$WORKDIR"

            echo "🔐 Writing .env"
            ENV_FILE="$APP_WORKDIR/.env"
            > "$ENV_FILE"
            for VAR in $(jq -r '.env_vars[]' "$MANIFEST"); do
              echo "${VAR}=${!VAR}" >> "$ENV_FILE"
            done
            chown ubuntu:ubuntu "$ENV_FILE"
            chmod 600 "$ENV_FILE"
            echo "  ✅ .env written with $(wc -l < "$ENV_FILE") variable(s)"

            echo "➡ Making create_app.sh executable"
            chmod +x codebuild/create_app.sh

            echo "➡ Running repo-owned create_app.sh"
            export APP_NAME

            sudo -E bash codebuild/create_app.sh
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_PERSIST_SEARCH_CACHE: ${{ secrets.VITE_PERSIST_SEARCH_CACHE }}
          SITE_PASSCODE: ${{ secrets.SITE_PASSCODE }}
