name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application-source/package-lock.json

      - name: Install dependencies
        working-directory: application-source
        run: npm install

      - name: Build application
        working-directory: application-source
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_PERSIST_SEARCH_CACHE: ${{ secrets.VITE_PERSIST_SEARCH_CACHE }}
          SITE_PASSCODE: ${{ secrets.SITE_PASSCODE }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: application-source/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist-artifact

      - name: Transfer build artifacts to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "dist-artifact/*"
          target: "/tmp/pixel-hunter-ui-dist"
          strip_components: 1

      - name: Deploy and Configure
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GITHUB_REPOSITORY,APP_SECRET_JSON_B64,SITE_PASSCODE,VITE_API_BASE_URL,VITE_PERSIST_SEARCH_CACHE
          script: |
            set -e

            APP_NAME="$(basename $GITHUB_REPOSITORY)"
            APP_DIR="/opt/apps/$APP_NAME"
            SECRET_PATH="/opt/secrets/${APP_NAME}.json"

            echo "➡ Injecting secrets for $APP_NAME"
            sudo mkdir -p /opt/secrets
            echo "$APP_SECRET_JSON_B64" \
              | base64 --decode \
              | sudo tee "$SECRET_PATH" > /dev/null
            sudo chown ubuntu:ubuntu "$SECRET_PATH"
            sudo chmod 600 "$SECRET_PATH"

            echo "➡ Deploying $APP_NAME"
            cd $APP_DIR

            echo "🧹 Cleaning and updating code"
            git fetch origin main
            git reset --hard origin/main

            echo "🚀 Installing pre-built artifacts"
            rm -rf application-source/dist
            mkdir -p application-source/dist
            cp -r /tmp/pixel-hunter-ui-dist/* application-source/dist/
            rm -rf /tmp/pixel-hunter-ui-dist

            echo "➡ Handover to standardized create_app.sh"
            export APP_NAME
            export APP_SECRET_PATH="$SECRET_PATH"
            sudo -E bash codebuild/create_app.sh

            echo "✅ Deploy completed successfully"
        env:
          APP_SECRET_JSON_B64: ${{ secrets.APP_SECRET_JSON_B64 }}
          SITE_PASSCODE: ${{ secrets.SITE_PASSCODE }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_PERSIST_SEARCH_CACHE: ${{ secrets.VITE_PERSIST_SEARCH_CACHE }}
